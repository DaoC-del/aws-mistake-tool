name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: >
          pyinstaller
          --onefile
          --name aws-mistake-tool
          --add-data "app.py;."
          --add-data "db.py;."
          --add-data "parser.py;."
          --collect-all streamlit
          --hidden-import streamlit.web.cli
          --hidden-import streamlit.runtime.scriptrunner
          launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-mistake-tool-windows
          path: dist/aws-mistake-tool.exe
          if-no-files-found: error

      - name: Print download instructions
        shell: bash
        run: |
          echo "## ✅ Windows EXE build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The EXE has been uploaded as an artifact." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**To download:**" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Scroll to the **Artifacts** section at the bottom of this page." >> "$GITHUB_STEP_SUMMARY"
          echo "2. Click **aws-mistake-tool-windows** to download the ZIP." >> "$GITHUB_STEP_SUMMARY"
          echo "3. Unzip to get \`aws-mistake-tool.exe\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> This workflow is **not** a CI check – it builds a real, runnable Windows executable." >> "$GITHUB_STEP_SUMMARY"
